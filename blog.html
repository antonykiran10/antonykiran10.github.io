<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Silent Neuron</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #fafaf8; --ink: #1a1a18; --muted: #888880; --accent: #b5a48a; --rule: #e8e6e0; }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 40px;
      background: var(--bg);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
      z-index: 10;
    }
    nav.scrolled { border-color: var(--rule); }
    .nav-name { font-family: 'Lora', serif; font-size: 0.9rem; font-weight: 500; color: var(--ink); text-decoration: none; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--ink); }

    /* ── Main ── */
    main { flex: 1; max-width: 640px; margin: 0 auto; padding: 120px 32px 80px; width: 100%; }

    /* ── Header ── */
    .blog-header {
      margin-bottom: 64px;
      opacity: 0; transform: translateY(16px);
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
    }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    .blog-header h1 {
      font-family: 'Lora', serif;
      font-weight: 500;
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .blog-header .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
      font-family: 'Lora', serif;
    }
    .blog-header hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin-top: 32px;
    }

    /* ── Post list ── */
    .post-list { list-style: none; }

    .post-item {
      padding: 28px 0;
      border-bottom: 1px solid var(--rule);
      opacity: 0; transform: translateY(12px);
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .post-item:nth-child(1) { animation-delay: 0.15s; }
    .post-item:nth-child(2) { animation-delay: 0.22s; }
    .post-item:nth-child(3) { animation-delay: 0.29s; }
    .post-item:nth-child(4) { animation-delay: 0.36s; }
    .post-item:nth-child(5) { animation-delay: 0.43s; }

    .post-meta {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .post-title {
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .post-title a {
      color: var(--ink);
      text-decoration: none;
      transition: color 0.2s;
    }
    .post-title a:hover { color: var(--accent); }

    .post-excerpt {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .read-more {
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .read-more:hover { opacity: 0.65; }

    /* ── Empty state ── */
    .empty {
      padding: 48px 0;
      font-family: 'Lora', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    footer { text-align: center; padding: 24px 32px; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--rule); }
  </style>
</head>
<body>

<nav id="nav">
  <a class="nav-name" href="index.html">Antony Kiran</a>
  <div class="nav-links">
    <a href="index.html">About</a>
    <a href="blog.html" class="active">The Silent Neuron</a>
  </div>
</nav>

<main>
  <header class="blog-header">
    <h1>The Silent Neuron</h1>
    <p class="subtitle">Writing on neuroscience, science, and everything that excites me.</p>
    <hr />
  </header>

  <!-- =====================================================
       HOW TO ADD A POST:
       Copy one <li class="post-item">...</li> block,
       paste it at the TOP of the list (newest first),
       and fill in: date, title, href, excerpt.
       ===================================================== -->
  <ul class="post-list">

    <!-- SAMPLE POST — replace or delete -->
    <li class="post-item">
      <p class="post-meta">5 March 2026</p>
      <h2 class="post-title"><a href="#">Stay Tuned</a></h2>
      <p class="post-excerpt">Work in Progress</p>
      <a class="read-more" href="#">Read &rarr;</a>
    </li>

    <!-- Add more posts above this comment -->

  </ul>

</main>

<footer>© 2026 Antony Kiran Kolarikkal David &middot; <a href="blog.html" style="color:inherit;text-decoration:none;">The Silent Neuron</a></footer>

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 10);
  });
</script>
</body>
</html>
